model:
  type: pdc
  checkpoint:
    path:
  encoder:
    node_feat_dim: 128
    pair_feat_dim: 64
    num_layers: 6
    dropout: 0.2
    num_nearest_neighbors: 8
    norm_coors: False
    update_coors_mean: False
    update_coors_var: True
  resolution: CA
  use_plm: False
  target: chi_angle

data:
  type: pdbredo_chain
  csv_path: /nfs_beijing/qijin/WorkSpace/003.affinity/data/gen_data/01.130k_interface/collects_231028/interfaces.withstat.csv
  processed_dir: ./data/PDB_Interface_processed
  transform:
    - type: select_atom
      resolution: backbone+CB
#    - type: focused_random_patch
#      focus_attr: focus_flag       # a randomly selected chain
#      seed_nbh_size: 32
#      patch_size: 128
    - type: merge_chains
      use_sasa: False
      max_len: 1000
    - type: corrupt_chi_angle
      ratio_mask: 0.4
      maskable_flag_attr: focus_flag
#    - type: random_mask_amino_acids
#      mask_ratio_in_all: 0.3
#      ratio_in_maskable_limit: 0.5
#      maskable_flag_attr: core_flag
#      mask_ratio_mode: constant

train:
  loss_weights:
    mse_1chis: 0.25
    mse_2chis: 0.25
    mse_3chis: 0.25
    mse_4chis: 0.25
#    mlm: 1.0
  max_iters: 100_000
  val_freq: 500
  batch_size: 64
  seed: 2023
  max_grad_norm: 100.0
  optimizer:
    type: adam
    lr: 1.e-4
    weight_decay: 0.0
    beta1: 0.9
    beta2: 0.999
  scheduler:
    type: plateau
    factor: 0.8
    patience: 5
    min_lr: 1.e-6
