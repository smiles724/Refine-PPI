model:
  type: Equiformer
  checkpoint:
    path: ./trained_models/equiformer2.pt
    type: Equiformer
  encoder:
    input_feat_dim: 32
    node_feat_dim: 32
    num_nearest_neighbors: 8
    num_layers: 2
    num_degrees: 2
    heads: 8
  use_plm: False

data:
  reset: False
  skempi_csv_path: ./data/SKEMPI_v2/skempi_v2.csv
  skempi_pdb_dir: ./data/SKEMPI_v2/PDBs
  cache_dir: ./data/SKEMPI_v2_cache
  predicted_structure: False
  use_plm: False
  transform:
  - type: select_atom
    resolution: backbone+CB
  - type: selected_region_fixed_size_patch
    select_attr: mut_flag
    patch_size: 128

train:
  loss_weights:
    pos_refine: 10.0
    regression: 1.0
  max_iters: 100_000
  val_freq: 1000
  batch_size: 64
  seed: 2023
  max_grad_norm: 100.0
  optimizer:
    type: adam
    lr: 3.e-4
    weight_decay: 0.0
    beta1: 0.9
    beta2: 0.999
  scheduler:
    type: plateau
    factor: 0.8
    patience: 5
    min_lr: 1.e-6
